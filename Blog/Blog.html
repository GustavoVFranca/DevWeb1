<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Meu Blog</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      background: #dce8f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      background: #1a6fbf;
      color: white;
      text-align: center;
      padding: 30px;
      margin-bottom: 20px;
    }

    .banner {
      background: #a8c8e8;
      height: 200px;
      margin-bottom: 20px;
    }

    .grade-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .grade-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .grade-sidebar {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border: 1px solid #a8c8e8;
      padding: 12px;
    }

    .card img-placeholder {
      display: block;
      background: #ccc;
      width: 100%;
      height: 100px;
    }

    .img-box {
      background: #a8c8e8;
    }

    .img-box-tall {
      background: #a8c8e8;
    }

  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>Meu Blog</h1>
      <p>Página pessoal</p>
    </header>

    <div class="banner"></div>

    <div class="grade-3">
      <div class="card">
        <div class="img-box"></div>
      </div>
      <div class="card">
        <div class="img-box"></div>
      </div>
      <div class="card">
        <div class="img-box"></div>
      </div>
    </div>

    <div class="grade-2">
      <div class="card">
        <div class="img-box"></div>
        <h3>Post 1</h3>
        <p>aprendendo html.</p>
        <p>01/03/2025</p>
      </div>
      <div class="card">
        <div class="img-box"></div>
        <h3>Post 2</h3>
        <p>aprendendo poo.</p>
        <p>10/03/2025</p>
      </div>
    </div>

    <div class="grade-sidebar">
      <div class="card">
        <div class="img-box-tall"></div>
        <h3>Post destaque</h3>
        <p>Texto do post aqui.</p>
      </div>
      <div class="card">
        <div class="img-box-tall"></div>
        <p>Sidebar</p>
      </div>
    </div>

  </div>

</body>
</html>
