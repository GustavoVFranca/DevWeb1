<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exercícios JavaScript</title>
</head>
<body>

  <h1>Exercício 1 - Dados pessoais</h1>
  <input type="text" id="nome" placeholder="Nome"><br><br>
  <input type="text" id="idade" placeholder="Idade"><br><br>
  <input type="text" id="endereco" placeholder="Endereço"><br><br>
  <input type="text" id="cep" placeholder="CEP"><br><br>
  <input type="text" id="cpf" placeholder="CPF"><br><br>
  <button onclick="mostrarDados()">Mostrar</button>
  <p id="resultado1"></p>

  <hr>

  <h1>Exercício 2 - Maior número</h1>
  <input type="number" id="n1" placeholder="Número 1"><br><br>
  <input type="number" id="n2" placeholder="Número 2"><br><br>
  <input type="number" id="n3" placeholder="Número 3"><br><br>
  <button onclick="maiorNumero()">Verificar</button>
  <p id="resultado2"></p>

  <hr>

  <h1>Exercício 3 - Situação eleitoral</h1>
  <input type="number" id="idadeVoto" placeholder="Idade"><br><br>
  <button onclick="verificarVoto()">Verificar</button>
  <p id="resultado3"></p>

  <script>
    function mostrarDados() {
      let nome = document.getElementById("nome").value;
      let idade = document.getElementById("idade").value;
      let endereco = document.getElementById("endereco").value;
      let cep = document.getElementById("cep").value;
      let cpf = document.getElementById("cpf").value;

      document.getElementById("resultado1").innerHTML =
        "Nome: " + nome + "<br>" +
        "Idade: " + idade + "<br>" +
        "Endereço: " + endereco + "<br>" +
        "CEP: " + cep + "<br>" +
        "CPF: " + cpf;
    }

    function maiorNumero() {
      let n1 = parseFloat(document.getElementById("n1").value);
      let n2 = parseFloat(document.getElementById("n2").value);
      let n3 = parseFloat(document.getElementById("n3").value);
      let maior;

      if (n1 >= n2 && n1 >= n3) {
        maior = n1;
      } else if (n2 >= n1 && n2 >= n3) {
        maior = n2;
      } else {
        maior = n3;
      }

      document.getElementById("resultado2").innerHTML = "O maior número é: " + maior;
    }

    function verificarVoto() {
      let idade = parseInt(document.getElementById("idadeVoto").value);
      let resultado;

      if (idade < 16) {
        resultado = "Não vota.";
      } else if (idade === 16 || idade === 17) {
        resultado = "Voto opcional.";
      } else if (idade <= 70) {
        resultado = "Voto obrigatório.";
      } else {
        resultado = "Voto opcional.";
      }

      document.getElementById("resultado3").innerHTML = resultado;
    }
  </script>

</body>
</html>
